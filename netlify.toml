[build]
  command   = "ng build --configuration production"
  publish   = "dist/wms-chat-ui/browser"

# ── Security Headers ─────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(self)"
    # COOP kept for popup isolation — does NOT require cross-origin isolation
    Cross-Origin-Opener-Policy = "same-origin"
    # COEP "require-corp" REMOVED — it blocks Google Fonts (fonts.gstatic.com)
    # and any other CDN that doesn't set Cross-Origin-Resource-Policy headers.
    # CSP replaces it for security:
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://wms-bot-backend.onrender.com; frame-src 'none'; object-src 'none';"

# ── JS/CSS Cache ──────────────────────────────────────────────
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Angular SPA Routing ───────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
